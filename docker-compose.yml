services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/cognitive_os
      - NEXT_PUBLIC_API_ENDPOINT=http://localhost:8000
    depends_on:
      - db
      - chromadb
    networks:
      - cognitive_net

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cognitive_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cognitive_net

  chromadb:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - cognitive_net

volumes:
  postgres_data:
  chroma_data:

networks:
  cognitive_net:
